name: Build & Release

on:
  push:
    tags:
      - "develop-v*" # pre-release / dev build
      - "release-v*" # stable release

permissions:
  contents: write

env:
  APP_SLUG: dev-launch-kit

jobs:
  build:
    name: Build · ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            platform: macos
            arch: x64
            target: x86_64-apple-darwin
          - os: macos-latest
            platform: macos
            arch: arm64
            target: aarch64-apple-darwin

    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version from tag
        id: get_version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/release-v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/release-v}
          elif [[ $GITHUB_REF == refs/tags/develop-v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/develop-v}
          else
            VERSION="0.0.0"
          fi
          echo "Detected version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Stamp version into package.json + tauri.conf.json
        shell: bash
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json')); p.version=process.env.VERSION; fs.writeFileSync('package.json', JSON.stringify(p, null, 2));"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json')); p.version=process.env.VERSION; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(p, null, 2));"
          # Cargo.toml — line-based replace to avoid pulling toml CLI
          sed -i.bak -E "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml || true
          rm -f src-tauri/Cargo.toml.bak
          echo "--- package.json ---"; grep '"version"' package.json
          echo "--- tauri.conf.json ---"; grep '"version"' src-tauri/tauri.conf.json
          echo "--- Cargo.toml ---"; grep '^version' src-tauri/Cargo.toml

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare Tauri signing key
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$RAW_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty."
            echo "Generate locally:  npx @tauri-apps/cli signer generate -w dev-launch-kit.key"
            echo "Then add the file contents (without the 'untrusted comment:' line)"
            echo "as a GitHub repo secret named TAURI_SIGNING_PRIVATE_KEY."
            exit 1
          fi
          # Strip 'untrusted comment:' header + any whitespace if present.
          BASE64_KEY=$(echo "$RAW_KEY" | grep -v "^untrusted comment:" | tr -d '[:space:]')
          if [ -z "$BASE64_KEY" ]; then
            echo "::error::Could not extract base64 key from secret."
            exit 1
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY=$BASE64_KEY" >> $GITHUB_ENV

      - name: Build Tauri bundle
        run: npm run tauri build -- --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect & rename artifacts
        shell: bash
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p release-artifacts
          BUNDLE="src-tauri/target/${TARGET}/release/bundle"
          PREFIX="${APP_SLUG}-${VERSION}-${PLATFORM}-${ARCH}"

          echo "=== Bundle tree ==="
          ls -R "$BUNDLE" || true

          if [ "$PLATFORM" = "windows" ]; then
            cp "$BUNDLE"/nsis/*.exe "release-artifacts/${PREFIX}-setup.exe" 2>/dev/null || true
            cp "$BUNDLE"/msi/*.msi  "release-artifacts/${PREFIX}.msi"       2>/dev/null || true
            # Updater bundles for tauri-plugin-updater (signed .nsis.zip).
            UB=$(find "$BUNDLE" -name "*.nsis.zip" | head -n 1)
            [ -n "$UB" ] && cp "$UB" "release-artifacts/${PREFIX}-updater.nsis.zip"
            US=$(find "$BUNDLE" -name "*.nsis.zip.sig" | head -n 1)
            [ -n "$US" ] && cp "$US" "release-artifacts/${PREFIX}-updater.nsis.zip.sig"
          elif [ "$PLATFORM" = "linux" ]; then
            cp "$BUNDLE"/appimage/*.AppImage "release-artifacts/${PREFIX}.AppImage" 2>/dev/null || true
            cp "$BUNDLE"/deb/*.deb           "release-artifacts/${PREFIX}.deb"      2>/dev/null || true
            chmod +x "release-artifacts/${PREFIX}.AppImage" 2>/dev/null || true
            UB=$(find "$BUNDLE" -name "*.AppImage.tar.gz" | head -n 1)
            [ -n "$UB" ] && cp "$UB" "release-artifacts/${PREFIX}-updater.AppImage.tar.gz"
            US=$(find "$BUNDLE" -name "*.AppImage.tar.gz.sig" | head -n 1)
            [ -n "$US" ] && cp "$US" "release-artifacts/${PREFIX}-updater.AppImage.tar.gz.sig"
          elif [ "$PLATFORM" = "macos" ]; then
            cp "$BUNDLE"/dmg/*.dmg "release-artifacts/${PREFIX}.dmg" 2>/dev/null || true
            UB=$(find "$BUNDLE" -name "*.app.tar.gz" | head -n 1)
            [ -n "$UB" ] && cp "$UB" "release-artifacts/${PREFIX}-updater.app.tar.gz"
            US=$(find "$BUNDLE" -name "*.app.tar.gz.sig" | head -n 1)
            [ -n "$US" ] && cp "$US" "release-artifacts/${PREFIX}-updater.app.tar.gz.sig"
          fi

          echo "=== Final artifacts ==="
          ls -la release-artifacts/

      - name: Build Windows portable ZIP
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          ARCH: ${{ matrix.arch }}
          TARGET: ${{ matrix.target }}
        run: |
          $releaseDir = "src-tauri/target/${env:TARGET}/release"
          $portableExe = $null
          # Cargo package is `tauri-app` so the bin is `tauri-app.exe` —
          # but if you rename later we still try a few candidates.
          $candidates = @(
            "$releaseDir/tauri-app.exe",
            "$releaseDir/dev-launch-kit.exe",
            "$releaseDir/Dev Launch Kit.exe"
          )
          foreach ($c in $candidates) {
            if (Test-Path $c) { $portableExe = $c; break }
          }
          if (-not $portableExe) {
            Write-Host "::warning::No portable .exe found; skipping ZIP."
            exit 0
          }
          New-Item -ItemType Directory -Force -Path "portable-staging" | Out-Null
          Copy-Item $portableExe -Destination "portable-staging/dev-launch-kit.exe"
          # Bundle any sibling DLLs (WebView2Loader etc).
          Get-ChildItem "$releaseDir/*.dll" -ErrorAction SilentlyContinue |
            ForEach-Object {
              Copy-Item $_.FullName -Destination "portable-staging/"
              Write-Host "Bundled DLL: $($_.Name)"
            }
          $zip = "release-artifacts/${env:APP_SLUG}-${env:VERSION}-windows-${env:ARCH}-portable.zip"
          Compress-Archive -Path "portable-staging/*" -DestinationPath $zip -Force
          Remove-Item -Recurse -Force "portable-staging"
          Write-Host "Portable ZIP: $zip"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: artifacts-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-artifacts/*
          retention-days: 7
          if-no-files-found: warn

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version from tag
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/release-v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/release-v}
          elif [[ $GITHUB_REF == refs/tags/develop-v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/develop-v}
          else
            VERSION="0.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Generate updater.json from signed bundles
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          node << 'EOF'
          const fs = require("fs");
          const path = require("path");

          const version = process.env.VERSION;
          const tag = process.env.TAG_NAME;
          const repo = process.env.GITHUB_REPOSITORY;
          const baseUrl = `https://github.com/${repo}/releases/download/${tag}`;

          const updater = JSON.parse(fs.readFileSync("updater.json", "utf8"));
          updater.version = version;
          updater.pub_date = new Date().toISOString();

          // Map our artifact naming → tauri's platform keys.
          //
          // tauri-plugin-updater v2 looks up `<os>-<arch>-<installer>`
          // first (e.g. windows-x86_64-nsis) and only falls back to the
          // bare `<os>-<arch>` after that fails. Earlier releases only
          // had the bare key, so users on Windows hit:
          //
          //   "None of the fallback platforms
          //    ['windows-x86_64-nsis', 'windows-x86_64'] were found"
          //
          // Publishing BOTH keys per platform (pointing at the same
          // bundle/signature) covers the plugin's primary lookup and
          // leaves a back-compat alias for older clients.
          const platforms = {
            "windows-x86_64": {
              ext: "windows-x64-updater.nsis.zip",
              keys: ["windows-x86_64-nsis", "windows-x86_64"],
            },
            "linux-x86_64": {
              ext: "linux-x64-updater.AppImage.tar.gz",
              keys: ["linux-x86_64-appimage", "linux-x86_64"],
            },
            "darwin-x86_64": {
              ext: "macos-x64-updater.app.tar.gz",
              keys: ["darwin-x86_64"],
            },
            "darwin-aarch64": {
              ext: "macos-arm64-updater.app.tar.gz",
              keys: ["darwin-aarch64"],
            },
          };

          // Rebuild platforms from scratch so any stale entry from the
          // previous release (or seed stubs with empty URLs) gets dropped.
          // tauri-plugin-updater chokes on empty URLs ("relative URL
          // without a base") instead of treating them as "no update".
          updater.platforms = {};
          const files = fs.readdirSync("artifacts");
          for (const [name, { ext, keys }] of Object.entries(platforms)) {
            const bundle = files.find((f) => f.endsWith(ext));
            const sig = bundle && files.find((f) => f === `${bundle}.sig`);
            if (!bundle) {
              console.warn(`! Missing bundle for ${name} (looking for *${ext})`);
              continue;
            }
            const sigContent = sig
              ? fs.readFileSync(path.join("artifacts", sig), "utf8").trim()
              : "";
            const entry = {
              url: `${baseUrl}/${bundle}`,
              signature: sigContent,
            };
            for (const k of keys) {
              updater.platforms[k] = entry;
            }
            console.log(
              `✓ ${name} (${keys.join(", ")}) → ${bundle}${sig ? "" : "  (no sig!)"}`,
            );
          }

          fs.writeFileSync("updater.json", JSON.stringify(updater, null, 2));
          console.log("\nUpdated updater.json:");
          console.log(fs.readFileSync("updater.json", "utf8"));
          EOF

      - name: Commit updater.json to main
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add updater.json
          if git diff --staged --quiet; then
            echo "No updater.json changes to commit."
            exit 0
          fi
          git commit -m "chore: updater.json for ${{ github.ref_name }} [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      - name: Determine release type
        id: type
        run: |
          if [[ "${{ github.ref }}" == refs/tags/release-v* ]]; then
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "name=Dev Launch Kit ${{ steps.get_version.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "name=Dev Launch Kit ${{ steps.get_version.outputs.version }} (dev)" >> $GITHUB_OUTPUT
          fi

      - name: Stage release files
        run: |
          mkdir -p release-files
          # Upload installers + updater bundles. Skip .sig files — those are
          # already embedded in updater.json and don't need a public URL.
          find artifacts -type f ! -name "*.sig" -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.type.outputs.name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ steps.type.outputs.is_prerelease }}
          files: release-files/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
